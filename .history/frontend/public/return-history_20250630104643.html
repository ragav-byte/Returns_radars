<!-- public/return-history.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Return History</title>
    <script type="module">
      import('/src/components/ReturnHistory.js').then(({ default: ReturnHistory }) => {
        import('https://unpkg.com/react@18/umd/react.development.js');
        import('https://unpkg.com/react-dom@18/umd/react-dom.development.js');

        const user = JSON.parse(localStorage.getItem("loggedInUser"));
        console.log("👤 Loaded user in new tab:", user);

        const rootDiv = document.createElement("div");
        document.body.appendChild(rootDiv);

        ReactDOM.createRoot(rootDiv).render(
          React.createElement(ReturnHistory, { user })
        );
      });
    </script>
  </head>
  <body></body>
</html>
